services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pumpstation
      POSTGRES_PASSWORD: pumpstation_dev
      POSTGRES_DB: pumpstation_marketplace
    ports:
      - "5432:5432"
    volumes:
      - pumpstation_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pumpstation -d pumpstation_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pumpstation_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pumpstation_pg:
  pumpstation_redis:
